<body class="min-h-screen flex flex-col items-center justify-center p-md antialiased">
<!-- Suppressing Navigation Shells due to Linear/Transactional Intent -->
<div class="w-full max-w-md flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-xl text-center flex flex-col items-center">
<div class="h-12 w-12 bg-primary rounded-lg flex items-center justify-center mb-md shadow-sm">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">
          analytics
        </span>
</div>
<h1 class="font-h1 text-h1 text-primary font-black tracking-tighter">SEO TaskFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Enterprise Admin Portal</p>
</div>
<!-- Login Card Container -->
<div class="bg-surface-container-lowest w-full rounded-xl shadow-[0px_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant/30 p-xl">
<div class="mb-lg">
<h2 class="font-h3 text-h3 text-on-surface">Sign In</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Enter your credentials to access the admin dashboard.</p>
</div>
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">mail</span>
</div>
<input class="w-full pl-xl pr-sm py-[10px] bg-surface-bright border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="email" name="email" placeholder="admin@seotaskflow.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs mt-sm">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary hover:text-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="w-full pl-xl pr-sm py-[10px] bg-surface-bright border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-sm mb-md">
<input class="h-4 w-4 text-primary bg-surface-bright border-outline-variant rounded focus:ring-primary cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-sm block font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember-me">
            Remember me for 30 days
          </label>
</div>
<!-- Submit Action -->
<button class="w-full flex items-center justify-center gap-sm bg-primary text-on-primary py-[12px] px-lg rounded-lg font-label-bold text-label-bold hover:bg-primary-fixed-variant hover:shadow-[0px_4px_12px_rgba(0,61,155,0.2)] active:opacity-80 transition-all duration-200" type="submit">
          Login as Admin
          <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
          Not an administrator? 
          <a class="font-label-bold text-label-bold text-primary hover:text-primary-fixed-variant transition-colors ml-xs" href="#">Login as Student</a>
</p>
</div>
</div>
<!-- Minimal Footer -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-outline">
        © 2024 SEO TaskFlow. All rights reserved.
      </p>
</div>
