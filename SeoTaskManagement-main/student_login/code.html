<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-md sm:p-lg">
<!-- Main Login Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_2px_4px_rgba(0,0,0,0.05)] border border-surface-variant p-xl flex flex-col gap-xl relative overflow-hidden">
<!-- Decorative top accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<!-- Header -->
<div class="flex flex-col items-center text-center gap-xs">
<div class="flex items-center justify-center gap-sm mb-sm text-primary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">dataset</span>
<span class="font-h3 text-h3 tracking-tight">SEO TaskFlow</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface">Student Portal</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Sign in to manage your assignments and submissions.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline text-[18px]">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-2xl pr-md py-[10px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="email" placeholder="student@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline text-[18px]">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-2xl pr-md py-[10px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="mt-sm w-full bg-primary text-on-primary font-label-bold text-label-bold py-[12px] px-lg rounded-lg flex items-center justify-center gap-sm hover:bg-primary-fixed-variant transition-all duration-200 shadow-[0_2px_4px_rgba(0,82,204,0.1)] hover:shadow-[0_4px_8px_rgba(0,82,204,0.2)] active:scale-[0.99]" type="button">
<span>Login as Student</span>
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="pt-lg border-t border-surface-variant flex flex-col gap-md">
<a class="group flex items-center justify-center gap-xs font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:text-primary transition-colors">person_add</span>
<span>Join as Student (Request Access)</span>
</a>
<div class="flex items-center justify-center w-full">
<div class="h-px bg-surface-variant flex-1"></div>
<span class="font-body-sm text-body-sm text-outline px-md uppercase tracking-wider text-[10px]">Or</span>
<div class="h-px bg-surface-variant flex-1"></div>
</div>
<a class="group flex items-center justify-center gap-xs font-body-sm text-body-sm text-on-surface-variant hover:text-secondary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:text-secondary transition-colors">admin_panel_settings</span>
<span>Login as Admin</span>
</a>
</div>
</div>
